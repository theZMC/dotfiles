#:schema https://mise.en.dev/schema/mise.json
# tombi: format.rules.table-keys-order = "ascending"

[settings]
experimental = true
auto_install = true
lockfile = true
minimum_release_age = "7d"

[settings.npm]
package_manager = "pnpm"

[shell_alias]
helm3 = "mise x helm@3 -- helm"

[tools]
bat = "0.26.1"
bottom = "0.14.4"
bun = "1.3.14"
"cargo:taws" = "1.2.1"
crane = "0.21.7"
crossplane-cli = "2.3.3"
deno = "2.9.2"
dive = "0.13.1"
docker-cli = "29.6.1"
dotnet = "10.0.201"
dotnet-core = "10.0.301"
fd = "10.4.2"
flux2 = "2.9.1"
fzf = "0.74.0"
gh = "2.96.0"
"github:atanunq/viu" = "1.6.1"
"github:charmbracelet/glow" = "2.1.2"
"github:charmbracelet/gum" = "v0.17.0"
"github:k3d-io/k3d" = "v5.9.0"
"github:tmuxpack/tpack" = "v1.2.1"
"github:tombi-toml/tombi" = "v1.2.0"
"github:uutils/coreutils" = "0.9.0"
"github:uutils/findutils" = "0.9.1"
"github:uutils/sed" = "0.1.1"
go = "1.26.5"
"go:github.com/awslabs/eks-node-viewer/cmd/eks-node-viewer" = "0.7.4"
"go:github.com/charmbracelet/crush" = "v0.83.0"
"go:golang.org/x/tools/gopls" = "v0.23.0"
golangci-lint = "2.12.2"
golangci-lint-langserver = "0.0.12"
helm = "4.2.3"
helm-ls = "0.5.4"
istioctl = "1.30.2"
java = "26.0.1"
k9s = "0.51.0"
kubectl = "1.36.2"
lazygit = "0.63.0"
lua-language-server = "3.18.2"
mkcert = "1.4.4"
neovim = "0.12.4"
node = "26.5.0"
npm = "11.18.0"
"npm:@astrojs/language-server" = "2.16.12"
"npm:@playwright/cli" = "latest"
"npm:@playwright/mcp" = "0.0.78"
"npm:@rynfar/meridian" = "1.49.0"
"npm:@slidev/cli" = "52.17.0"
"npm:@sveltejs/mcp" = "0.1.25"
"npm:@upstash/context7-mcp" = "3.2.3"
"npm:@vtsls/language-server" = "0.3.0"
"npm:agent-browser" = "0.31.2"
"npm:bash-language-server" = "5.6.0"
"npm:ctx7" = "0.5.4"
"npm:prettier" = "3.9.5"
"npm:skills" = "1.5.17"
"npm:svelte-language-server" = "0.18.3"
oh-my-posh = "29.24.0"
packer = "1.15.4"
pnpm = "11.11.0"
pre-commit = "4.6.0"
pulumi = "3.251.0"
python = "3.14.6"
ripgrep = "15.1.0"
ruff = "0.15.21"
rust = "1.97.0"
rust-analyzer = "2026-06-01"
shellcheck = "0.11.0"
shfmt = "3.13.1"
sops = "3.13.2"
stylua = "2.5.2"
taplo = "0.10.0"
