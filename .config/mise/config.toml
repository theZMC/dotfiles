yazi = "26.5.6"
yq = "4.53.3"
zoxide = "0.9.9"
aws-cli = { version = "2.35.8", symlink_bins = "true" }
"github:docker/buildx" = { version = "0.34.1", bin = "docker-buildx", postinstall = 'mkdir -p "$HOME/.docker/cli-plugins" && ln -sf "$(which docker-buildx)" "$HOME/.docker/cli-plugins/docker-buildx"' }
hyperfine = "latest"

[tools.docker-compose]
version = "5.1.4"
postinstall = 'mkdir -p "$HOME/.docker/cli-plugins" && ln -sf "$(which docker-cli-plugin-docker-compose)" "$HOME/.docker/cli-plugins/docker-compose"'

[tools."github:defenseunicorns/uds-cli"]
version = "v0.33.0"
bin = "uds"

[tools."github:zarf-dev/zarf"]
version = "v0.79.0"
bin = "zarf"

[tools."npm:@anthropic-ai/claude-code"]
version = "2.1.186"
allow_builds = ["@anthropic-ai/claude-code"]
minimum_release_age = "1d"

[tools."npm:opencode-ai"]
version = "1.17.9"
allow_builds = ["opencode-ai"]
minimum_release_age = "1d"
