#:schema https://mise.en.dev/schema/mise.json
# tombi: format.rules.table-keys-order = "ascending"

[settings]
experimental = true
auto_install = true
lockfile = true
minimum_release_age = "7d"

[settings.npm]
package_manager = "pnpm"

[shell_alias]
helm3 = "mise x helm@3 -- helm"

[tools]
bat = "0.26.1"
bottom = "0.12.3"
bun = "1.3.14"
"cargo:taws" = "1.2.1"
crane = "0.21.7"
crossplane-cli = "2.3.2"
deno = "2.8.3"
dive = "0.13.1"
docker-cli = "29.6.0"
dotnet = "10.0.201"
dotnet-core = "10.0.301"
fd = "10.4.2"
flux2 = "2.8.8"
fzf = "0.73.1"
gh = "2.95.0"
"github:atanunq/viu" = "1.6.1"
"github:charmbracelet/glow" = "2.1.2"
"github:charmbracelet/gum" = "v0.17.0"
"github:k3d-io/k3d" = "v5.9.0"
"github:tmuxpack/tpack" = "v1.1.0"
"github:tombi-toml/tombi" = "v1.1.3"
"github:uutils/coreutils" = "0.9.0"
"github:uutils/findutils" = "0.8.0"
"github:uutils/sed" = "0.1.1"
go = "1.26.4"
"go:github.com/awslabs/eks-node-viewer/cmd/eks-node-viewer" = "0.7.4"
"go:github.com/charmbracelet/crush" = "v0.77.0"
"go:golang.org/x/tools/gopls" = "v0.22.0"
golangci-lint = "2.12.2"
golangci-lint-langserver = "0.0.12"
helm = "4.2.2"
helm-ls = "0.5.4"
istioctl = "1.30.1"
java = "26.0.1"
k9s = "0.51.0"
kubectl = "1.36.2"
lazygit = "0.62.2"
lua-language-server = "3.18.2"
mkcert = "1.4.4"
neovim = "0.12.3"
node = "26.3.1"
npm = "11.17.0"
"npm:@astrojs/language-server" = "2.16.10"
"npm:@playwright/cli" = "latest"
"npm:@playwright/mcp" = "0.0.76"
"npm:@rynfar/meridian" = "1.44.0"
"npm:@slidev/cli" = "52.16.0"
"npm:@sveltejs/mcp" = "0.1.24"
"npm:@upstash/context7-mcp" = "3.2.0"
"npm:@vtsls/language-server" = "0.3.0"
"npm:agent-browser" = "0.28.0"
"npm:bash-language-server" = "5.6.0"
"npm:ctx7" = "0.5.3"
"npm:prettier" = "3.8.4"
"npm:skills" = "1.5.12"
"npm:svelte-language-server" = "0.18.2"
oh-my-posh = "29.17.0"
packer = "1.15.4"
pnpm = "11.8.0"
pre-commit = "4.6.0"
pulumi = "3.247.0"
python = "3.14.6"
ripgrep = "15.1.0"
ruff = "0.15.18"
rust = "1.96.0"
rust-analyzer = "2026-06-01"
shellcheck = "0.11.0"
shfmt = "3.13.1"
sops = "3.13.1"
stylua = "2.5.2"
taplo = "0.10.0"
