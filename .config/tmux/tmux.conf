setw -g mode-keys vi
setw -g monitor-activity on

set -g default-terminal "tmux-256color"
set -g history-limit 1000000
set -g mouse on
set -g destroy-unattached on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none
set -g focus-events on

set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -gq allow-passthrough on

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -n C-s setw synchronize-panes
bind -n C-g display-popup -E -d "#{pane_current_path}" -xC -yC -w 90% -h 90% "$SHELL -ilc 'lazygit'"

set -g @plugin 'tmux-plugins/tmux-logging#b5c5f7b9bc679ca161a442e932d6186da8d3538f'
set -g @plugin 'tmux-plugins/tmux-sensible#25cb91f42d020f675bb0a2ce3fbd3a5d96119efa'
set -g @plugin 'tmux-plugins/tmux-yank#acfd36e4fcba99f8310a7dfb432111c242fe7392'
set -g @plugin 'christoomey/vim-tmux-navigator#e41c431a0c7b7388ae7ba341f01a0d217eb3a432'
set -g @plugin 'roosta/tmux-fuzzback#0aafeeec4555d7b44a5a2a8252f29c238d954d59'

set -g @yank_action 'copy-pipe'
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '90%'
set -g @fuzzback-finder-layout 'reverse'

# astrodark theme
set -g @fuzzback-fzf-colors 'bg:#1A1D23,fg:#ADB0BB,hl:#5EB7FF,fg+:#5EB7FF,bg+:#1A1D23,hl+:#5EB7FF,spinner:#5EB7FF,pointer:#5EB7FF,prompt:#5EB7FF,marker:#5EB7FF,header:#50A4E9,gutter:#1A1D23,border:#3A3E47'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

set -g mode-style "fg=#50A4E9,bg=default"

set -g message-style "fg=#50A4E9,bg=default"
set -g message-command-style "fg=#50A4E9,bg=default"

set -g pane-border-style "fg=#26343F"
set -g pane-active-border-style "fg=#50A4E9"

set -g status "on"
set -g status-justify "left"
set -g status-position top

set -g status-style "fg=#50A4E9,bg=default"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#50A4E9,bg=default,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#50A4E9,bg=default] \
#(~/.config/tmux/icons/time) \
%H:%M #[fg=#1A1D23,bg=#50A4E9,bold] \
#(~/.config/tmux/icons/os) #h "

setw -g automatic-rename on
setw -g window-status-activity-style "blink,fg=#595C66,bg=default"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#595C66,bg=default"
setw -g window-status-format \
"#[default] \
#(~/.config/tmux/icons/number #I) \
#{b:pane_current_path}#{?SSH_CONNECTION,@#H,} \
#(~/.config/tmux/icons/status #{pane_current_command} #{pane_current_path}) \
#[fg=#111317,bg=#111317,nobold,nounderscore,noitalics]"

setw -g window-status-current-format \
"#[bg=#50A4E9,fg=#1A1D23,bold] \
#(~/.config/tmux/icons/number #I) \
#{b:pane_current_path}#{?SSH_CONNECTION,@#H,} \
#(~/.config/tmux/icons/status #{pane_current_command} #{pane_current_path}) \
#[fg=#26343F,bg=none,nobold,nounderscore,noitalics]"

# Use fzf to switch windows with W; from: https://www.reddit.com/r/tmux/comments/rfae7o/navigate_sessions_windows_with_fzf/
bind W display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} - #{window_name}' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | sed -E 's/\s-.*$//' | xargs -r tmux switch-client -t"
