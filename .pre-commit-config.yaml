repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0 # v6.0.0
  hooks:
  - id: check-yaml
    args:
    - --allow-multiple-documents
    - --unsafe
  - id: check-toml
  - id: check-json
  - id: end-of-file-fixer
  - id: trailing-whitespace
  - id: check-added-large-files
    args:
    - --maxkb=500
- repo: local
  hooks:
  - id: yamlfmt
    name: yamlfmt
    files: \.ya?ml$
    language: system
    entry: yamlfmt
    args:
    - -formatter
    - indentless_arrays=true,retain_line_breaks=true,scan_folded_as_literal=true
  - id: tombi-format
    name: tombi format
    files: \.toml$
    language: system
    entry: tombi
    args:
    - format
  - id: trufflehog
    name: trufflehog
    language: system
    entry: trufflehog filesystem --no-update
  - id: shfmt
    name: shfmt
    language: system
    types_or: [sh, bash, zsh]
    entry: shfmt -l -w -ci -i 2
  - id: shellcheck
    name: shellcheck
    language: system
    types_or: [sh, bash]
    entry: shellcheck
  - id: update-mise-lock
    name: update mise.lock
    language: system
    entry: bash
    files: ^\.config/mise/(config\.toml|mise\.lock)$
    args:
    - -c
    - |
      GITHUB_TOKEN=$(gh auth token || true) mise lock
  - id: sync-claude-skills
    name: sync .agents/skills to .claude/skills
    language: system
    entry: bash
    files: ^\.agents/skills/
    pass_filenames: false
    args:
    - -c
    - |
      mise run claude:skills:sync && git add .claude/skills
