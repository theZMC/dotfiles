repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-yaml
    args:
    - --allow-multiple-documents
    - --unsafe
  - id: check-toml
  - id: check-json
  - id: end-of-file-fixer
  - id: trailing-whitespace
  - id: check-added-large-files
    args:
    - --maxkb=500
- repo: local
  hooks:
  - id: yamlfmt
    name: yamlfmt
    files: \.ya?ml$
    language: system
    entry: yamlfmt
    args:
    - -formatter
    - indentless_arrays=true,retain_line_breaks=true,scan_folded_as_literal=true
  - id: trufflehog
    name: TruffleHog
    language: system
    entry: trufflehog filesystem --no-update
  - id: shfmt
    name: shfmt
    language: system
    types_or: [sh, bash, zsh]
    entry: shfmt -l -w -ci -i 2
  - id: update-mise-lock
    name: Update mise.lock
    language: system
    entry: bash
    files: ^\.config/mise/(config\.toml|mise\.lock)$
    args:
    - -c
    - |
      GITHUB_TOKEN=$(gh auth token || true) mise lock
